<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop 😍</title>
    <link rel="stylesheet" href="style.css" /> <!-- style.css file linked to index.html file -->
</head>
<body>
    <header>
        <h1>Coffee Shop</h1>
    </header>

    <main class="app">
        <section class="panel">
            <div class="option-group">
                <h2>Drinks</h2>
            
                <div class="radio-group">
                <label>
                    <input type="radio" name="coffee-type" value="masala_chai">
                    Masala Chai
                </label>
                <label>
                    <input type="radio" name="coffee-type" value="adrak_chai">
                    Adrak Chai
                </label>
                <label>
                    <input type="radio" name="coffee-type" value="elaichi_chai">
                    Elaichi Chai
                </label>
                <label>
                    <input type="radio" name="coffee-type" value="chocolate_chai">
                    Chocolate Chai
                </label>
                <label>
                    <input type="radio" name="coffee-type" value="black_tea">
                    Black Tea
                </label>

                </div>

            </div>
            <div class="option-group">
                <h2>SIZE</h2>

                <div class="radio-group">
                <label>
                    <input type="radio" name="coffee-size" value="small">
                    Small
                </label>
                <label>
                    <input type="radio" name="coffee-size" value="medium">
                    Medium
                </label>
                <label>
                    <input type="radio" name="coffee-size" value="large">
                    Large
                </label>

                </div>
                <div class="option-group">
                    <h2>MILK</h2>
                    <div class="radio-group">
                    <label>
                        <input type="radio" name="milk" value="regular">
                        Regular
                    </label>
                    <label>
                        <input type="radio" name="milk" value="oat">
                        Oat
                    </label>
                    <label>
                        <input type="radio" name="milk" value="almond">
                        Almond
                    </label>
                    <label>
                        <input type="radio" name="milk" value="soy">
                        Soy
                    </label>
                    <label>
                        <input type="radio" name="milk" value="no milk">
                        No Milk 
                    </label>
                    </div>

                    <div class="option-group">
                        <h2>EXTRA</h2>
                        <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="extras" value="bun_maska">
                            Bun Maska
                        </label>
                        <label>
                            <input type="checkbox" name="extras" value="vanilla syrup">
                            Vanilla Syrup
                        </label>
                        <label>
                            <input type="checkbox" name="extras" value="caramel syrup">
                            Caramel Syrup
                        </label>
                        <label>
                            <input type="checkbox" name="extras" value="coco_powder">
                            Coco Powder
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <section class="visual">
            <div class="cup-scene">
                <div class="cup" id="cup">
                    <div class="cup-fill"></div>
                    <div class="cup-shine"></div>
                </div>
                <div class="cup-base"></div>
                <div class="cup-handle"></div>
                <div class="badges" id="badges">
                    <span class="badge" id="badge-bun_maska" aria-label="Bun Maska">＋</span>
                    <span class="badge" id="badge-vanilla" aria-label="Vanilla syrup">〜</span>
                    <span class="badge" id="badge-caramel" aria-label="Caramel syrup">✦</span>
                    <span class="badge" id="badge-coco_powder" aria-label="Coco Powder">☁</span>
                </div>
            </div>

            <div class="summary" id="summary" aria-live="polite"></div>
        </section>
        
    </main>
    <script src="script.js"></script> <!-- script.js file linked to index.html file -->
</body>
</html>
